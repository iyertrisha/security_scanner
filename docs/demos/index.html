<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NetGuard — Demo recordings</title>
  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --border: #233049;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at 20% -10%, #0f2944 0%, var(--bg) 45%);
      color: var(--text);
      line-height: 1.5;
      padding: 1.5rem 1rem 3rem;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); margin: 0 0 1.5rem; }
    a { color: var(--accent); }
    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    section h2 { margin: 0 0 0.75rem; font-size: 1.05rem; }
    video {
      width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      background: #000;
    }
    .hint { font-size: 0.85rem; color: var(--muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NetGuard demo recordings</h1>
    <p class="sub">
      Live app: <a href="https://net-guard-msrit.vercel.app/" target="_blank" rel="noreferrer">net-guard-msrit.vercel.app</a>
      · Repo: <a href="https://github.com/iyertrisha/security_scanner" target="_blank" rel="noreferrer">security_scanner</a>
    </p>

    <section>
      <h2>1. Dashboard, login, and scan overview</h2>
      <video controls playsinline preload="metadata" src="./01-netguard-dashboard-and-scan.mov"></video>
      <p class="hint">Run <code>git lfs pull</code> if the video does not load.</p>
    </section>

    <section>
      <h2>2. PR scan results and findings</h2>
      <video controls playsinline preload="metadata" src="./02-pr-scan-and-findings.mov"></video>
    </section>

    <section>
      <h2>3. LLM autofix and post comment to GitHub PR</h2>
      <video controls playsinline preload="metadata" src="./03-autofix-and-github-pr-comment.mov"></video>
    </section>
  </div>
</body>
</html>
