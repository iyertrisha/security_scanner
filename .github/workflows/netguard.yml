name: NetGuard IaC Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

# LLM (GEMINI_API_KEY / LLM_PROVIDER) is not configured here — set on the host behind NETGUARD_API_URL (API + risk_scorer processes), e.g. via .env.
# Customer repos only need these GitHub secrets for scanning: NETGUARD_API_URL,
# NETGUARD_SECRET, NETGUARD_API_KEY (optional NETGUARD_UI_URL for links).
#
# CI auth bypass for /api/scan: NetGuard's middleware skips X-API-Key when
# X-NetGuard-Signature is a valid HMAC over the body. The scan POST then
# resolves the org from the body's `api_key` field. Save the service-org's
# API key as the NETGUARD_API_KEY secret, in addition to NETGUARD_SECRET.

jobs:
  netguard-scan:
    name: NetGuard Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect all IaC files in PR branch
        id: collect
        run: |
          # Scan ALL .tf / .yaml / .yml files tracked in the PR head branch,
          # not just the files that changed. This gives the scorer full context
          # about the current infrastructure topology.
          ALL_IAC=$(git ls-files '*.tf' '*.yaml' '*.yml' || true)
          echo "iac_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_IAC" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Verify NetGuard API is reachable
        if: steps.collect.outputs.iac_files != ''
        run: |
          API="${NETGUARD_API_URL%/}"
          API="${API%/api}"
          curl -sf -H 'ngrok-skip-browser-warning: 1' "$API/health" \
            || { echo "::error::Cannot reach $API/health — is the API running and ngrok forwarding to port 8000?"; exit 1; }
        env:
          NETGUARD_API_URL: ${{ secrets.NETGUARD_API_URL }}

      - name: Run NetGuard scan
        id: scan
        if: steps.collect.outputs.iac_files != ''
        run: python scripts/post_pr_findings.py
        env:
          # Full list of all IaC files in this PR branch (newline-separated paths).
          IAC_FILES: ${{ steps.collect.outputs.iac_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          NETGUARD_API_URL: ${{ secrets.NETGUARD_API_URL }}
          NETGUARD_SECRET: ${{ secrets.NETGUARD_SECRET }}
          # Org-scoped NetGuard API key issued via /api/auth/signup → /api/auth/login.
          NETGUARD_API_KEY: ${{ secrets.NETGUARD_API_KEY }}

      - name: Post PR comment
        if: steps.collect.outputs.iac_files != ''
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.scan.outputs.comment_body }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.COMMENT_BODY,
            })

      - name: Enforce merge blocking
        if: steps.collect.outputs.iac_files != ''
        run: |
          if [ "${{ steps.scan.outputs.blocking }}" = "true" ]; then
            echo "NetGuard blocking merge due to non-overridden HIGH or CRITICAL findings."
            exit 1
          fi
          echo "No blocking HIGH or CRITICAL findings."
        env:
          NETGUARD_API_URL: ${{ secrets.NETGUARD_API_URL }}
